<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="j9RBt7maRAU3kGgrHUTstQMfBfD9zR0MyloSd8Dm72c" />
<meta name="description" content="Arivu Spark — Tuition Center Portal for student management, fees, results, tasks, and study material.">
<title>Arivu Spark — Tuition Center Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{
  --navy:#10233f;
  --navy-light:#1c3a63;
  --navy-soft:#27456f;
  --gold:#c9a227;
  --gold-light:#e7c969;
  --cream:#f8f3e7;
  --cream-dark:#ece2cc;
  --ink:#1f2a3c;
  --muted:#6b7587;
  --success:#2e7d4f;
  --danger:#b3402a;
  --line:#ddd2b5;
  --radius:10px;
  --shadow:0 4px 18px rgba(16,35,63,0.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,h4{font-family:'Playfair Display',serif;color:var(--navy);margin:0;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
.hidden{display:none !important;}

/* ===== Login ===== */
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy) 0%, var(--navy-light) 55%, var(--navy-soft) 100%);
  padding:24px;
}
.login-card{
  background:var(--cream);width:100%;max-width:430px;border-radius:14px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);padding:42px 38px;
  border-top:6px solid var(--gold);
}
.brand{text-align:center;margin-bottom:6px;}
.brand .crest{
  width:64px;height:64px;border-radius:50%;background:var(--navy);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  border:3px solid var(--gold);
}
.brand .crest span{font-family:'Playfair Display',serif;font-weight:800;color:var(--gold-light);font-size:26px;}
.brand h1{font-size:26px;letter-spacing:0.5px;}
.brand p{color:var(--muted);margin-top:4px;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;}
.role-tabs{display:flex;gap:8px;margin:26px 0 18px;border-bottom:1px solid var(--line);}
.role-tab{
  flex:1;text-align:center;padding:10px 0;font-weight:600;color:var(--muted);
  border:none;background:none;border-bottom:3px solid transparent;font-size:14px;
  transition:all .15s;
}
.role-tab.active{color:var(--navy);border-bottom-color:var(--gold);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase;}
.field input, .field select, .field textarea{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;
  background:#fff;font-size:15px;font-family:inherit;color:var(--ink);
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--gold);border-color:var(--gold);}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 20px;border-radius:8px;border:none;font-weight:600;font-size:14px;
  cursor:pointer;transition:all .15s;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy-light);}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:transparent;border:1px solid var(--navy);color:var(--navy);}
.btn-outline:hover{background:var(--navy);color:#fff;}
.btn-danger{background:#fff;border:1px solid var(--danger);color:var(--danger);}
.btn-danger:hover{background:var(--danger);color:#fff;}
.btn-sm{padding:6px 12px;font-size:12.5px;border-radius:6px;}
.btn-block{width:100%;}
.error-msg{color:var(--danger);font-size:13px;margin-top:10px;text-align:center;min-height:18px;}

/* ===== App shell ===== */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:250px;background:var(--navy);color:#fff;flex-shrink:0;
  display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100vh;
}
.sidebar .crest{width:50px;height:50px;border-radius:50%;background:var(--navy-soft);
  display:flex;align-items:center;justify-content:center;margin:0 auto 8px;border:2px solid var(--gold);}
.sidebar .crest span{font-family:'Playfair Display',serif;font-weight:800;color:var(--gold-light);font-size:20px;}
.sidebar .brand-name{text-align:center;font-family:'Playfair Display',serif;font-weight:700;font-size:18px;color:var(--gold-light);}
.sidebar .brand-sub{text-align:center;font-size:10px;color:#a9b6cc;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
.user-box{
  display:flex;align-items:center;gap:10px;padding:12px 20px;margin:0 14px 18px;
  background:rgba(255,255,255,0.06);border-radius:10px;
}
.avatar{
  width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--navy);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Playfair Display',serif;
  flex-shrink:0;font-size:17px;
}
.user-box .uname{font-weight:600;font-size:14px;}
.user-box .urole{font-size:11px;color:#a9b6cc;text-transform:capitalize;letter-spacing:.5px;}
.nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:6px 14px;overflow-y:auto;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;
  color:#cdd6e6;text-decoration:none;font-size:14px;font-weight:500;border:none;
  background:none;text-align:left;width:100%;
}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:var(--gold);color:var(--navy);font-weight:700;}
.nav-icon{font-size:16px;width:20px;text-align:center;}
.signout{margin:10px 14px 0;}
.main{flex:1;padding:28px 34px;max-width:100%;overflow-x:hidden;}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.page-header h2{font-size:26px;}
.page-header .sub{color:var(--muted);font-size:13px;margin-top:4px;}

/* ===== Cards / stats ===== */
.grid{display:grid;gap:18px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);}}
@media(max-width:680px){.grid-4,.grid-2{grid-template-columns:1fr;}}
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--cream-dark);}
.stat-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);
  border-left:5px solid var(--gold);position:relative;overflow:hidden;}
.stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.stat-card .value{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--navy);margin-top:6px;}
.stat-card .extra{font-size:12px;color:var(--muted);margin-top:4px;}
.section-title{font-size:18px;margin:28px 0 12px;border-bottom:2px solid var(--gold);padding-bottom:8px;display:inline-block;}

/* ===== Table ===== */
.table-wrap{overflow-x:auto;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:600px;}
th,td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--cream-dark);white-space:nowrap;}
th{background:var(--navy);color:#fff;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;}
tbody tr:hover{background:var(--cream);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;}
.badge-navy{background:var(--navy);color:#fff;}
.badge-gold{background:var(--gold);color:var(--navy);}
.badge-blue{background:#2b5fa0;color:#fff;}
.badge-green{background:var(--success);color:#fff;}
.badge-grey{background:#e2e6ec;color:var(--muted);}

/* ===== Toolbar ===== */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
.toolbar input[type=text], .toolbar select{
  padding:9px 12px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;background:#fff;
}
.spacer{flex:1;}

/* ===== Modal ===== */
.modal-overlay{
  position:fixed;inset:0;background:rgba(16,35,63,0.55);display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:20px;
}
.modal{background:#fff;border-radius:12px;max-width:640px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--cream-dark);display:flex;justify-content:space-between;align-items:center;}
.modal-head h3{font-size:20px;}
.modal-close{background:none;border:none;font-size:22px;color:var(--muted);line-height:1;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--cream-dark);display:flex;justify-content:flex-end;gap:10px;}
.check-row{display:flex;flex-wrap:wrap;gap:10px 18px;}
.check-row label{display:flex;align-items:center;gap:6px;font-weight:500;font-size:13.5px;text-transform:none;color:var(--ink);}

/* ===== Toast ===== */
#toastBox{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;}
.toast{padding:13px 20px;border-radius:8px;color:#fff;font-weight:600;font-size:14px;box-shadow:0 6px 20px rgba(0,0,0,0.2);
  animation:slidein .2s ease;min-width:220px;}
.toast.success{background:var(--success);}
.toast.error{background:var(--danger);}
@keyframes slidein{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* ===== Empty state ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-state .icon{font-size:40px;margin-bottom:10px;}

/* ===== Gallery ===== */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
.gallery-item{background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
.gallery-item img{width:100%;height:160px;object-fit:cover;display:block;}
.gallery-item .gi-body{padding:12px 14px;}
.gallery-item .gi-body h4{font-size:15px;}
.gallery-item .gi-body p{font-size:12.5px;color:var(--muted);margin:6px 0 10px;}

/* ===== Print ===== */
#printArea{display:none;}
@media print{
  body *{visibility:hidden;}
  #printArea, #printArea *{visibility:visible;}
  #printArea{display:block !important;position:absolute;top:0;left:0;width:100%;padding:30px;}
  .no-print{display:none !important;}
}
.print-doc{font-family:'DM Sans',sans-serif;color:#10233f;}
.print-doc h2{font-family:'Playfair Display',serif;border-bottom:3px solid #c9a227;padding-bottom:10px;}
.print-doc table{width:100%;border-collapse:collapse;margin-top:14px;}
.print-doc td,.print-doc th{border:1px solid #999;padding:8px;font-size:13px;}
.sig-row{display:flex;justify-content:space-between;margin-top:60px;}
.sig-row div{border-top:1px solid #333;padding-top:6px;width:200px;text-align:center;font-size:12px;}

/* ===== Misc ===== */
.muted{color:var(--muted);}
.small{font-size:12px;}
.fee-hint{font-size:12px;color:var(--muted);margin-top:4px;}
.upi-box{border:2px dashed var(--gold);border-radius:10px;padding:16px;text-align:center;margin-top:10px;background:var(--cream);}
.upi-box .qr{width:120px;height:120px;background:#fff;border:1px solid var(--line);margin:10px auto;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);}
.flex-row{display:flex;gap:10px;flex-wrap:wrap;}
.help-text{font-size:12px;color:var(--muted);margin-top:6px;}
.chat-removed-note{font-size:12px;color:var(--muted);}
</style>
</head>
<body>

<!-- ===================== LOADING ===================== -->
<div class="login-wrap" id="loadingScreen">
  <div class="login-card" style="text-align:center;">
    <div class="brand">
      <div class="crest"><span>AS</span></div>
      <h1>Arivu Spark</h1>
      <p>Tuition Center Portal</p>
    </div>
    <p class="muted" style="margin-top:18px;">Connecting to portal data&hellip;</p>
  </div>
</div>

<!-- ===================== LOGIN ===================== -->
<div class="login-wrap hidden" id="loginScreen">
  <div class="login-card">
    <div class="brand">
      <div class="crest"><span>AS</span></div>
      <h1>Arivu Spark</h1>
      <p>Tuition Center Portal</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" data-role="admin" onclick="selectRole('admin')">Admin</button>
      <button class="role-tab" data-role="teacher" onclick="selectRole('teacher')">Teacher</button>
      <button class="role-tab" data-role="student" onclick="selectRole('student')">Student</button>
    </div>
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label>Login ID</label>
        <input type="text" id="loginId" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-gold btn-block">Sign In</button>
      <div class="error-msg" id="loginError"></div>
    </form>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div class="app hidden" id="appShell">
  <aside class="sidebar">
    <div class="crest"><span>AS</span></div>
    <div class="brand-name">Arivu Spark</div>
    <div class="brand-sub">Tuition Center</div>
    <div class="user-box">
      <div class="avatar" id="sbAvatar">A</div>
      <div>
        <div class="uname" id="sbName">—</div>
        <div class="urole" id="sbRole">—</div>
      </div>
    </div>
    <nav class="nav" id="navMenu"></nav>
    <div class="signout">
      <button class="btn btn-outline btn-block" style="border-color:var(--gold-light);color:var(--gold-light);" onclick="signOut()">Sign Out</button>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<!-- ===================== TOAST ===================== -->
<div id="toastBox"></div>

<!-- ===================== MODAL ROOT ===================== -->
<div id="modalRoot"></div>

<!-- ===================== PRINT AREA ===================== -->
<div id="printArea"></div>

<script>
/* =====================================================================
   ARIVU SPARK PORTAL — core data layer
   ===================================================================== */
const DB_KEYS = ['users','students','teachers','fees','tasks','results','materials','complaints','gallery','taskstatus'];

const CLASS_OPTIONS = Array.from({length:12},(_,i)=>'Class '+(i+1));
const SUBJECT_OPTIONS = ['English','Tamil','Hindi','Mathematics','Science','Physics','Chemistry','Biology','Social Science','Computer Science'];
const GALLERY_CATEGORIES = ['Events','Achievements','Classroom','Sports','Cultural'];

/* ---------------------------------------------------------------------
   Firebase / Firestore setup — shared cloud data store
   --------------------------------------------------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyDh_lnUVPkzwPUDqMbOgsMURXDkrfpMnMw",
  authDomain: "arivu-spark.firebaseapp.com",
  projectId: "arivu-spark",
  storageBucket: "arivu-spark.firebasestorage.app",
  messagingSenderId: "696447464576",
  appId: "1:696447464576:web:d30fe53276c999243ca265"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const PORTAL_COLLECTION = 'portal';

// In-memory cache mirroring Firestore documents (kept in sync via onSnapshot)
const cache = {};
let appReady = false;

function load(key){
  if(key==='counters') return cache.counters || {};
  return cache[key] || [];
}
function save(key, val){
  cache[key] = val;
  db.collection(PORTAL_COLLECTION).doc(key).set({value: val}).catch(err=>{
    console.error('Save failed for', key, err);
    toast('Could not sync to server. Check your internet connection.', 'error');
  });
}
function nextCounter(name){
  const c = cache.counters || {};
  c[name] = (c[name]||0)+1;
  cache.counters = c;
  db.collection(PORTAL_COLLECTION).doc('counters').set({value:c}).catch(err=>console.error('Counter sync failed', err));
  return c[name];
}

async function bootPortal(){
  const allKeys = [...DB_KEYS, 'counters'];
  const metaRef = db.collection(PORTAL_COLLECTION).doc('_meta');

  try{
    const metaSnap = await metaRef.get();
    if(!metaSnap.exists){
      // First-ever launch: seed a clean portal with just the default Administrator account
      const batch = db.batch();
      batch.set(db.collection(PORTAL_COLLECTION).doc('users'), {value:[{id:1, name:'Administrator', loginId:'admin', password:'admin123', role:'admin', email:'admin@arivuspark.edu'}]});
      DB_KEYS.filter(k=>k!=='users').forEach(k=> batch.set(db.collection(PORTAL_COLLECTION).doc(k), {value:[]}));
      batch.set(db.collection(PORTAL_COLLECTION).doc('counters'), {value:{user:1, student:0, teacher:0, fee:0, task:0, result:0, material:0, complaint:0, gallery:0, taskstatus:0}});
      batch.set(metaRef, {seeded:true, seededAt: firebase.firestore.FieldValue.serverTimestamp()});
      await batch.commit();
    }
  }catch(err){
    console.error('Seed check failed', err);
  }

  // Subscribe to live updates for every data collection
  const firstLoad = allKeys.map(key=> new Promise(resolve=>{
    let resolved = false;
    db.collection(PORTAL_COLLECTION).doc(key).onSnapshot(snap=>{
      const data = snap.data();
      cache[key] = data && data.value !== undefined ? data.value : (key==='counters' ? {} : []);
      if(!resolved){ resolved = true; resolve(); }
      else if(appReady){ maybeRerender(); }
    }, err=>{
      console.error('Listener error for', key, err);
      if(!resolved){ resolved = true; resolve(); }
    });
  }));

  await Promise.all(firstLoad);
  appReady = true;

  document.getElementById('loadingScreen').classList.add('hidden');
  if(session && session.userId){
    enterApp();
  } else {
    document.getElementById('loginScreen').classList.remove('hidden');
  }
}

function maybeRerender(){
  // Re-render the current page if data changed remotely, unless a modal/form is open
  if(!session) return;
  if(document.getElementById('modalRoot') && document.getElementById('modalRoot').innerHTML.trim() !== '') return;
  if(document.getElementById('appShell').classList.contains('hidden')) return;
  renderPage();
}

/* =====================================================================
   Session / Auth
   ===================================================================== */
let session = JSON.parse(sessionStorage.getItem('ass_session')||'null');
let currentRole = 'admin';

function selectRole(role){
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.toggle('active', t.dataset.role===role));
}

function handleLogin(e){
  e.preventDefault();
  const id = document.getElementById('loginId').value.trim();
  const pw = document.getElementById('loginPassword').value;
  const users = load('users');
  const user = users.find(u=>u.loginId===id && u.password===pw && u.role===currentRole);
  const err = document.getElementById('loginError');
  if(!user){ err.textContent = 'Invalid credentials. Please try again.'; return; }
  err.textContent='';
  session = {userId:user.id, role:user.role, name:user.name, loginId:user.loginId};
  sessionStorage.setItem('ass_session', JSON.stringify(session));
  document.getElementById('loginForm').reset();
  enterApp();
}

function signOut(){
  session = null;
  sessionStorage.removeItem('ass_session');
  document.getElementById('appShell').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginId').value='';
  document.getElementById('loginPassword').value='';
}

/* =====================================================================
   Toast
   ===================================================================== */
function toast(msg, type='success'){
  const box = document.getElementById('toastBox');
  const t = document.createElement('div');
  t.className = 'toast '+type;
  t.textContent = msg;
  box.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

/* =====================================================================
   Modal helper
   ===================================================================== */
function openModal(title, bodyHtml, footHtml){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target.id==='modalOverlay')closeModal()">
      <div class="modal">
        <div class="modal-head"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div class="modal-body">${bodyHtml}</div>
        ${footHtml? `<div class="modal-foot">${footHtml}</div>`:''}
      </div>
    </div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* =====================================================================
   Navigation config per role
   ===================================================================== */
const NAV_CONFIG = {
  admin:[
    {id:'dashboard', label:'Dashboard', icon:'&#9670;'},
    {id:'students', label:'Students', icon:'&#127891;'},
    {id:'teachers', label:'Teachers', icon:'&#128100;'},
    {id:'fees', label:'Fee Management', icon:'&#128176;'},
    {id:'gallery', label:'Gallery', icon:'&#128247;'},
    {id:'accounts', label:'User Accounts', icon:'&#128272;'}
  ],
  teacher:[
    {id:'dashboard', label:'Dashboard', icon:'&#9670;'},
    {id:'students', label:'Students', icon:'&#127891;'},
    {id:'tasks', label:'Tasks', icon:'&#128221;'},
    {id:'results', label:'Results', icon:'&#128202;'},
    {id:'materials', label:'Study Material', icon:'&#128218;'},
    {id:'complaints', label:'Complaints', icon:'&#128172;'},
    {id:'gallery', label:'Gallery', icon:'&#128247;'}
  ],
  student:[
    {id:'dashboard', label:'My Dashboard', icon:'&#9670;'},

/* =====================================================================
   Helpers
   ===================================================================== */
function fmtDateLong(d){
  return d.toLocaleDateString('en-US',{weekday:'long', year:'numeric', month:'long', day:'numeric'});
}
function fmtDateShort(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(iso, n){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function getTaskStatuses(){ return load('taskstatus'); }
function getStatusFor(taskId, studentId){
  const list = getTaskStatuses();
  const rec = list.find(r=>String(r.taskId)===String(taskId) && String(r.studentId)===String(studentId));
  return rec? rec.status : 'Not Started';
}
function setStatusFor(taskId, studentId, status){
  let list = getTaskStatuses();
  const rec = list.find(r=>String(r.taskId)===String(taskId) && String(r.studentId)===String(studentId));
  if(rec){ rec.status = status; rec.updatedDate = todayISO(); }
  else{ list.push({id:nextCounter('taskstatus'), taskId:Number(taskId), studentId:Number(studentId), status, updatedDate: todayISO()}); }
  save('taskstatus', list);
}
function studentsForTask(t){
  const students = load('students');
  if(t.targetType==='class') return students.filter(s=>s.class===t.targetValue);
  const s = findStudent(t.targetValue);
  return s? [s] : [];
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function studentFullName(s){ return `${s.firstName} ${s.lastName}`; }
function findStudent(id){ return load('students').find(s=>String(s.id)===String(id)); }
function findTeacher(id){ return load('teachers').find(t=>String(t.id)===String(id)); }
function monthsList(){ return ['January','February','March','April','May','June','July','August','September','October','November','December']; }

function dashboardTeacher(){
  const students = load('students');
  const results = load('results');

  // Average % per student
  const perf = students.map(s=>{
    const rs = results.filter(r=>String(r.studentId)===String(s.id));
    let avg = null;
    if(rs.length){
      const pct = rs.map(r=> (Number(r.marks)/Number(r.total))*100);
      avg = pct.reduce((a,b)=>a+b,0)/pct.length;
    }
    return {id:s.id, name:studentFullName(s), cls:s.class, avg};
  }).filter(p=>p.avg!==null);

  const sorted = [...perf].sort((a,b)=>b.avg-a.avg);

  const bottom3 = [...sorted].slice(-3).reverse();

  return `

    <div class="stat-card"><div class="label">Results Recorded</div><div class="value">${results.length}</div></div>

    <div class="stat-card"><div class="label">Average Score</div><div class="value">${perf.length? (perf.reduce((a,b)=>a+b.avg,0)/perf.length).toFixed(1)+'%':'—'}</div></div>

    <div>
      <h3 class="section-title">Top 3 Performers</h3>
      <div class="table-wrap"><table><thead><tr><th>Name</th><th>Class</th><th>Average %</th></tr></thead>
      <tbody>${top3.length? top3.map(p=>`<tr><td>${escapeHtml(p.name)}</td><td><span class="badge badge-navy">${escapeHtml(p.cls)}</span></td><td>${p.avg.toFixed(1)}%</td></tr>`).join('') : `<tr><td colspan="3" class="muted">No results yet.</td></tr>`}</tbody></table></div>
    </div>
    <div>
      <h3 class="section-title">Bottom 3 Performers</h3>

function saveStudent(e){
  e.preventDefault();
  const first = document.getElementById('sFirstName').value.trim();
  const last = document.getElementById('sLastName').value.trim();
  const cls = document.getElementById('sClass').value;
  const fee = document.getElementById('sFee').value;
  const parent = document.getElementById('sParent').value.trim();
  const contact = document.getElementById('sContact').value.trim();
  if(!first || !cls || !fee || !parent || !contact){ toast('Please fill all mandatory fields.','error'); return; }

  let subjects = Array.from(document.querySelectorAll('input[name="subj"]:checked')).map(c=>c.value);
  const other = document.getElementById('sSubjectOther').value.trim();
  if(other) subjects.push(other);

  let loginId = document.getElementById('sLoginId').value.trim();
  let password = document.getElementById('sPassword').value.trim();
  if(!loginId) loginId = `std_${first.toLowerCase()}${String(Date.now()).slice(-4)}`;
  if(!password) password = 'student123';

  const id = nextCounter('student');
  const student = {
    id, firstName:first, lastName:last,
    dob: document.getElementById('sDob').value,
    gender: document.getElementById('sGender').value,
    class: cls, subjects,
    parent, contact,
    email: document.getElementById('sEmail').value.trim(),
    fee: Number(fee),
    address: document.getElementById('sAddress').value.trim(),
    loginId, password
  };
  const students = load('students'); students.push(student); save('students', students);

  const users = load('users');
  users.push({id: nextCounter('user'), name:`${first} ${last}`.trim(), loginId, password, role:'student', email:student.email});
  save('users', users);

  closeModal();
  toast('Student added successfully.');
  renderPage();
}

  let students = load('students');

  if(s){

  toast('Student deleted.');
  renderPage();
}

function confirmDeleteTeacher(id){

  const t = teachers.find(x=>x.id===id);
  teachers = teachers.filter(x=>x.id!==id);

    users = users.filter(u=>u.loginId!==t.loginId);

  toast('Teacher deleted.');

function visibleTasksForStudent(student){
  const tasks = load('tasks');
  const out = [];
  tasks.forEach(t=>{
    let applies = false;
    if(t.targetType==='student' && String(t.targetValue)===String(student.id)) applies = true;
    if(t.targetType==='class' && t.targetValue===student.class) applies = true;
    if(!applies) return;
    const status = getStatusFor(t.id, student.id);
    out.push({...t, occurrence:'Original', dueDate:t.assignedDate, status});
    (t.followups||[]).forEach((fd, idx)=>{
      if(todayISO() >= fd){
        out.push({...t, occurrence: idx===0? '3-Day Reminder':'7-Day Reminder', dueDate: fd, status});
      }
    });
  });
  return out.sort((a,b)=> a.dueDate < b.dueDate ? 1 : -1);
}

function downloadResultTemplate(){
  const students = load('students');
  const rows = [['Student ID','Student Name','Class','Exam','Subject','Date of Test','Marks','Total']];
  students.forEach(s=> rows.push([`STU-${String(s.id).padStart(4,'0')}`, studentFullName(s), s.class, '', '', '', '', '']));
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Results');
  XLSX.writeFile(wb, 'ArivuSpark_Results_Template.xlsx');
  toast('Template downloaded.');
}

function uploadResults(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    try{
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:'', raw:false});
      const students = load('students');
      let results = load('results');
      let added=0, skipped=0;
      rows.forEach(row=>{
        const idStr = String(row['Student ID']||'').trim();
        const exam = String(row['Exam']||'').trim();
        const marks = row['Marks'];
        const total = row['Total'];
        if(!exam || marks==='' || marks===undefined || total==='' || total===undefined){ return; } // unfilled, ignore
        const numericId = parseInt(idStr.replace(/\D/g,''), 10);
        const student = students.find(s=>s.id===numericId);
        if(!student){ skipped++; return; }
        let examDate = String(row['Date of Test']||'').trim();
        if(examDate){
          const parsed = new Date(examDate);
          if(!isNaN(parsed)) examDate = parsed.getFullYear()+'-'+String(parsed.getMonth()+1).padStart(2,'0')+'-'+String(parsed.getDate()).padStart(2,'0');
        }
        results.push({
          id: nextCounter('result'),
          studentId: student.id,
          studentName: studentFullName(student),
          class: student.class,
          exam, subject: String(row['Subject']||'').trim(),
          examDate: examDate || '',
          marks: Number(marks), total: Number(total)
        });
        added++;
      });
      save('results', results);
      toast(`Upload complete: ${added} result(s) added, ${skipped} row(s) skipped (unmatched Student ID).`);
      renderPage();
    }catch(err){
      toast('Failed to read Excel file.','error');
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value='';
}

/* =====================================================================
   PAGE: STUDY MATERIAL
   ===================================================================== */
function pageMaterials(){
  const materials = load('materials');
  if(session.role==='student'){
    const student = load('students').find(s=>s.loginId===session.loginId);
    const own = materials.filter(m=>m.class === (student? student.class : ''));
    return `
    <div class="page-header"><div><h2>Study Material</h2><div class="sub">Resources for ${escapeHtml(student?student.class:'your class')}</div></div></div>
    ${own.length? `<div class="grid grid-2">${own.map(m=>`
      <div class="card"><h4>${escapeHtml(m.title)}</h4><p class="muted">${escapeHtml(m.description)}</p>
      <span class="badge badge-navy">${escapeHtml(m.class)}</span>
      ${m.fileData? `<div style="margin-top:10px;"><a class="btn btn-sm btn-outline" href="${m.fileData}" download="${escapeHtml(m.fileName)}">&#128206; Download ${escapeHtml(m.fileName)}</a></div>` : ''}
      </div>`).join('')}</div>`
      : `<div class="empty-state"><div class="icon">&#128218;</div><p>No study material available yet.</p></div>`}
    `;
  }

  return `
  <div class="page-header">
    <div><h2>Study Material</h2><div class="sub">Upload material organized by class/grade</div></div>
    <button class="btn btn-gold" onclick="openMaterialForm()">+ Upload Material</button>
  </div>
  ${materials.length? `<div class="grid grid-2">${materials.map(m=>`
    <div class="card"><h4>${escapeHtml(m.title)}</h4>
    <p class="muted">${escapeHtml(m.description)}</p>
    ${m.fileData? `<div style="margin-bottom:10px;"><a class="btn btn-sm btn-outline" href="${m.fileData}" download="${escapeHtml(m.fileName)}">&#128206; ${escapeHtml(m.fileName)}</a></div>` : `<p class="small muted">No attachment</p>`}
    <div class="flex-row" style="justify-content:space-between;align-items:center;">
    <span class="badge badge-navy">${escapeHtml(m.class)}</span>
    <button class="btn btn-sm btn-danger" onclick="deleteMaterial(${m.id})">Delete</button>
    </div></div>`).join('')}</div>`
    : `<div class="empty-state"><div class="icon">&#128218;</div><p>No study material uploaded yet.</p></div>`}
  `;
}

function openMaterialForm(){
  openModal('Upload Study Material', `
    <form id="matForm" onsubmit="saveMaterial(event)">
      <div class="field"><label>Class / Grade *</label>
        <select id="mClass" required>${CLASS_OPTIONS.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Title *</label><input type="text" id="mTitle" required></div>
      <div class="field"><label>Description</label><textarea id="mDesc" rows="3"></textarea></div>
      <div class="field"><label>Attachment (optional)</label><input type="file" id="mFile"></div>
    </form>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="document.getElementById('matForm').requestSubmit()">Upload</button>
  `);
}
function saveMaterial(e){
  e.preventDefault();
  const title = document.getElementById('mTitle').value.trim();
  if(!title){ toast('Title is required.','error'); return; }
  const cls = document.getElementById('mClass').value;
  const desc = document.getElementById('mDesc').value.trim();
  const file = document.getElementById('mFile').files[0];

  const finalize = (fileData, fileName)=>{
    const materials = load('materials');
    materials.push({id: nextCounter('material'), class: cls, title, description: desc, fileData: fileData||null, fileName: fileName||null});
    save('materials', materials);
    closeModal();
    toast('Study material uploaded.');
    renderPage();
  };

  if(file){
    const reader = new FileReader();
    reader.onload = ev=> finalize(ev.target.result, file.name);
    reader.readAsDataURL(file);
  } else {
    finalize(null, null);
  }
}
function deleteMaterial(id){
  let materials = load('materials');
  materials = materials.filter(m=>m.id!==id);
  save('materials', materials);
  toast('Material removed.');
  renderPage();
}

/* =====================================================================
   PAGE: COMPLAINTS
   ===================================================================== */
function pageComplaints(){
  const complaints = load('complaints');
  if(session.role==='student'){
    const student = load('students').find(s=>s.loginId===session.loginId);
    const mine = complaints.filter(c=>String(c.studentId)===String(student?student.id:''));
    return `
    <div class="page-header">
      <div><h2>Complaints</h2><div class="sub">Raise concerns directly with the Administrator</div></div>
      <button class="btn btn-gold" onclick="openComplaintForm()">+ New Complaint</button>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Date</th><th>Complaint</th><th>Status</th></tr></thead>
    <tbody>${mine.length? [...mine].sort((a,b)=>b.id-a.id).map(c=>`
      <tr><td>${fmtDateShort(c.date)}</td><td>${escapeHtml(c.text)}</td><td><span class="badge ${c.status==='Resolved'?'badge-green':'badge-gold'}">${c.status}</span></td></tr>
    `).join('') : `<tr><td colspan="3"><div class="empty-state"><div class="icon">&#128172;</div><p>No complaints submitted yet.</p></div></td></tr>`}
    </tbody></table></div>
    `;
  }

  // Admin / Teacher view
  return `
  <div class="page-header"><div><h2>Complaints</h2><div class="sub">Complaints raised by students</div></div></div>
  <div class="table-wrap"><table><thead><tr><th>Date</th><th>Student</th><th>Complaint</th><th>Status</th>${session.role==='admin'?'<th>Actions</th>':''}</tr></thead>
  <tbody>${complaints.length? [...complaints].sort((a,b)=>b.id-a.id).map(c=>`
    <tr><td>${fmtDateShort(c.date)}</td><td>${escapeHtml(c.studentName)}</td><td>${escapeHtml(c.text)}</td>
    <td><span class="badge ${c.status==='Resolved'?'badge-green':'badge-gold'}">${c.status}</span></td>
    ${session.role==='admin'? `<td>${c.status!=='Resolved'? `<button class="btn btn-sm btn-outline" onclick="resolveComplaint(${c.id})">Mark Resolved</button>`:'—'}</td>`:''}</tr>
  `).join('') : `<tr><td colspan="${session.role==='admin'?5:4}"><div class="empty-state"><div class="icon">&#128172;</div><p>No complaints submitted yet.</p></div></td></tr>`}
  </tbody></table></div>
  `;
}

function openComplaintForm(){
  openModal('New Complaint', `
    <form id="cmpForm" onsubmit="saveComplaint(event)">
      <div class="field"><label>Your Complaint / Concern *</label><textarea id="cmpText" rows="4" required></textarea></div>
    </form>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="document.getElementById('cmpForm').requestSubmit()">Submit</button>
  `);
}
function saveComplaint(e){
  e.preventDefault();
  const text = document.getElementById('cmpText').value.trim();
  if(!text){ toast('Please enter your complaint.','error'); return; }
  const student = load('students').find(s=>s.loginId===session.loginId);
  const complaints = load('complaints');
  complaints.push({id: nextCounter('complaint'), studentId: student?student.id:null, studentName: student?studentFullName(student):session.name, text, date: todayISO(), status:'Open'});
  save('complaints', complaints);
  closeModal();
  toast('Complaint submitted to Admin.');
  renderPage();
}
function resolveComplaint(id){
  let complaints = load('complaints');
  complaints = complaints.map(c=> c.id===id? {...c, status:'Resolved'} : c);
  save('complaints', complaints);
  toast('Complaint marked as resolved.');
  renderPage();
}

/* =====================================================================
   PAGE: GALLERY
   ===================================================================== */
function pageGallery(){
  const gallery = load('gallery');
  const canManage = session.role==='admin' || session.role==='teacher';
  return `
  <div class="page-header">
    <div><h2>Gallery</h2><div class="sub">Photos from events, achievements & campus life</div></div>
    ${canManage? `<button class="btn btn-gold" onclick="openGalleryForm()">+ Upload Photo</button>`:''}
  </div>
  ${gallery.length? `<div class="gallery-grid">${gallery.map(g=>`
    <div class="gallery-item">
      <img src="${g.image}" alt="${escapeHtml(g.title)}">
      <div class="gi-body">
        <h4>${escapeHtml(g.title)}</h4>
        <span class="badge badge-navy">${escapeHtml(g.category)}</span>
        <p>${escapeHtml(g.description||'')}</p>
        ${canManage? `<button class="btn btn-sm btn-danger" onclick="deleteGalleryItem(${g.id})">Delete</button>`:''}
      </div>
    </div>`).join('')}</div>`
    : `<div class="empty-state"><div class="icon">&#128247;</div><p>No photos in the gallery yet.</p></div>`}
  `;
}

function openGalleryForm(){
  openModal('Upload Photo', `
    <form id="galForm" onsubmit="saveGalleryItem(event)">
      <div class="field"><label>Title *</label><input type="text" id="gTitle" required></div>
      <div class="field"><label>Category *</label>
        <select id="gCategory" required>${GALLERY_CATEGORIES.map(c=>`<option>${c}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Image *</label><input type="file" id="gImage" accept="image/*" required></div>
      <div class="field"><label>Description</label><textarea id="gDesc" rows="2"></textarea></div>
    </form>
  `, `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="document.getElementById('galForm').requestSubmit()">Upload</button>
  `);
}
function saveGalleryItem(e){
  e.preventDefault();
  const title = document.getElementById('gTitle').value.trim();
  const file = document.getElementById('gImage').files[0];
  if(!title || !file){ toast('Title and image are required.','error'); return; }
  const reader = new FileReader();
  reader.onload = function(ev){
    const gallery = load('gallery');
    gallery.push({id: nextCounter('gallery'), title, category: document.getElementById('gCategory').value, image: ev.target.result, description: document.getElementById('gDesc').value.trim()});
    save('gallery', gallery);
    closeModal();
    toast('Photo uploaded.');
    renderPage();
  };
  reader.readAsDataURL(file);
}
function deleteGalleryItem(id){
  let gallery = load('gallery');
  gallery = gallery.filter(g=>g.id!==id);
  save('gallery', gallery);
  toast('Photo removed.');
  renderPage();
}

/* =====================================================================
   PAGE: USER ACCOUNTS (admin only)
   ===================================================================== */
function pageAccounts(){
  const users = load('users');
  return `
  <div class="page-header"><div><h2>User Accounts</h2><div class="sub">All login accounts in the portal</div></div></div>
  <div class="table-wrap"><table><thead><tr><th>Name</th><th>Role</th><th>Login ID</th><th>Password</th><th>Email</th><th>Actions</th></tr></thead>
  <tbody>${users.map(u=>{
    const badge = u.role==='admin'?'badge-gold':u.role==='teacher'?'badge-blue':'badge-green';
    return `<tr><td>${escapeHtml(u.name)}</td><td><span class="badge ${badge}">${u.role}</span></td>
    <td>${escapeHtml(u.loginId)}</td><td>${escapeHtml(u.password)}</td><td>${escapeHtml(u.email||'—')}</td>
    <td>${u.role==='admin'? `<span class="badge badge-grey">Protected</span>` : `<button class="btn btn-sm btn-danger" onclick="deleteAccount(${u.id})">Delete</button>`}</td></tr>`;
  }).join('')}
  </tbody></table></div>
  `;
}
function deleteAccount(id){
  openModal('Delete Account', `<p>Are you sure you want to delete this user account?</p>`, `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-danger" onclick="confirmDeleteAccount(${id})">Delete</button>
  `);
}
function confirmDeleteAccount(id){
  let users = load('users');
  const u = users.find(x=>x.id===id);
  if(u && u.role==='admin'){ toast('Admin accounts are protected.','error'); closeModal(); return; }
  users = users.filter(x=>x.id!==id);
  save('users', users);
  if(u){
    if(u.role==='student'){ save('students', load('students').filter(s=>s.loginId!==u.loginId)); }
    if(u.role==='teacher'){ save('teachers', load('teachers').filter(t=>t.loginId!==u.loginId)); }
  }
  closeModal();
  toast('Account deleted.');
  renderPage();
}
